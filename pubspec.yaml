name: pendaftaran_domain_desa
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.1.11
  http: ^1.2.0

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  file_picker: ^8.1.2
  dio: ^5.9.2
  syncfusion_flutter_pdfviewer: ^33.1.47
  flutter_native_splash: ^2.4.6
  flutter_pdfview: ^1.3.2
  flutter_svg: ^2.0.10+1
  dropdown_search: ^5.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true

  image_path: assets/images/logo_icon.png

  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/images/logo_icon.png

flutter_native_splash:
  color: "#FFFFFF"
  android: true
  ios: true

  image: assets/images/logo_diskominfotik.png

  android_12:
    image: assets/images/logo_diskominfotik.png
    color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_diskominfotik.png
    - assets/images/pattern_top.png
    - assets/images/logo_icon.png
    - assets/images/pattern_top.svg
